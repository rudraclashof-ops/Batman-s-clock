<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Steampunk Clock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="clock">

  <!-- Gears -->
  <div class="gear gear1"></div>
  <div class="gear gear2"></div>
  <div class="gear gear3"></div>

  <!-- Clock -->
  <div class="dial">
    <div class="center spider"></div>

    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>

    <div class="number n12">12</div>
    <div class="number n3">3</div>
    <div class="number n6">6</div>
    <div class="number n9">9</div>
  </div>

  <!-- Particles -->
  <canvas id="particles"></canvas>

</div>

<script src="script.js"></script>
</body>
</html>
